<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Gerenciador Spring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h2 class="mb-0">Usuários no Banco de Dados (MySQL)</h2>
        </div>
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>E-mail</th>
                </tr>
                </thead>
                <tbody id="tabela-corpo">
                </tbody>
            </table>
            <button onclick="carregarUsuarios()" class="btn btn-outline-primary">Atualizar Lista</button>
        </div>
    </div>
</div>

<script>
    function carregarUsuarios() {
        fetch('/listar')
            .then(res => res.json())
            .then(dados => {
                const corpo = document.getElementById('tabela-corpo');
                corpo.innerHTML = ''; // Limpa a tabela antes de carregar
                dados.forEach(u => {
                    corpo.innerHTML += `<tr><td>${u.id}</td><td>${u.nome}</td><td>${u.email}</td></tr>`;
                });
            });
    }
    // Carrega assim que abrir a página
    carregarUsuarios();
</script>
</body>
</html>
